<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RROSE Style Layout</title>
    <style>
        /* 1. 画面全体の初期化と背景画像の設定 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            overflow-x: hidden; /* 横スクロールバーの発生を防ぐ */

            /* 💡 ここに背景画像の設定を追加しました */
            background-image: url("bg.jpg");       /* 💻 用意してあるJPGのファイル名に変えてください */
            background-size: cover;                /* 画面の縦横比に応じて隙間なく引き延ばす */
            background-position: center center;    /* 画像の中心を画面の真ん中に合わせる */
            background-attachment: fixed;          /* 💡 スクロールしても背景だけは動かずに固定する（お好みで） */
            background-repeat: no-repeat;          /* 画像が格子状にリピートされるのを防ぐ */
        }

        /* ヘッダー風のタイトル設定 */
        .site-header {
            position: absolute;
            top: 40px;          
            left: 5%;
            z-index: 10;
        }
        .site-title {
            font-size: 1.2rem;
            font-weight: normal;
            margin: 0;
        }

        /* 2. 画面いっぱいに広がる親コンテナ */
        .collage-container {
            position: relative;
            width: 100vw;       
            height: 250vh;      
            min-height: 1800px; 
        }

        /* 画像の共通設定 */
        .collage-container img {
            position: absolute;
            height: auto;
        }

        /* 3. 各画像の配置（縦の間隔を広く散らす） */
        
        /* [IMAGE 1] 左上 */
        .pos-style-1 { 
            width: 35vw;        
            top: 25vh;          
            left: 5vw;          
        }
        
        /* [IMAGE 2] 中央上部（赤ケーブル） */
        .pos-style-2 { 
            width: 10vw;
            top: 45vh;          
            left: 36vw;
        }
        
        /* [IMAGE 3] 右上 */
        .pos-style-3 { 
            width: 35vw;
            top: 75vh;          
            right: 8vw;         
        }
        
        /* [IMAGE 4] 左下（電球・部屋） */
        .pos-style-4 { 
            width: 22vw;
            top: 120vh;         
            left: 8vw;
        }

        /* [IMAGE 5] 右下（オープンリール） */
        .pos-style-5 {
            width: 30vw;
            top: 160vh;         
            right: 10vw;
        }

        /* [IMAGE 6] アンプ */
        .pos-style-6 {
            width: 50vw;        
            top: 200vh;         
            left: 36vw;         
        }

    </style>
</head>
<body>

    <div class="site-header">
        <div class="site-title">202606191648</div>
    </div>

    <div class="collage-container">
        <img src="image1.jpg" class="pos-style-1" alt="">
        <img src="image2.jpg" class="pos-style-2" alt="">
        <img src="image3.jpg" class="pos-style-3" alt="">
        <img src="image4.jpg" class="pos-style-4" alt="">
        <img src="image5.jpg" class="pos-style-5" alt="">
        <img src="image6.jpg" class="pos-style-6" alt="">
    </div>

</body>
</html>
